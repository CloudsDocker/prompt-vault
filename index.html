<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Prompt Vault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Prompt Vault',
      repo: 'phray2024/prompt-vault',
      loadSidebar: true,
      search: 'auto',
      auto2top: true
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <style>
    #copy-page-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 9999;
      padding: 0.5rem 1rem;
      background: #42b983;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: background 0.2s;
    }
    #copy-page-btn:hover { background: #369870; }
    #copy-page-btn.copied { background: #2c7a5a; }
  </style>
  <script>
    (function () {
      var btn = document.createElement('button');
      btn.id = 'copy-page-btn';
      btn.textContent = 'Copy page';
      document.body.appendChild(btn);

      btn.addEventListener('click', function () {
        var el = document.querySelector('.markdown-section') || document.querySelector('#main') || document.body;
        var text = el.innerText || el.textContent || '';
        navigator.clipboard.writeText(text.trim()).then(function () {
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(function () {
            btn.textContent = 'Copy page';
            btn.classList.remove('copied');
          }, 2000);
        });
      });
    })();
  </script>
</body>
</html>
